name: CI/CD Pipeline
on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: |
          pytest --maxfail=1 --disable-warnings -q

  docker-build:
    name: Docker-build
    runs-on: self-hosted
    needs: test
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build Docker image
      run: docker build -t ingdevopseval:${{ github.sha }} .
    - name: Save image as artifact
      run: docker save ingdevopseval:${{ github.sha }} > image.tar
    - uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: image.tar

  snyk-scan:
    name: Snyk Security Scan
    runs-on: self-hosted
    needs: docker-build
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'
    - run: pip install -r requirements.txt
    - name: Install Snyk CLI
      run: sudo npm install -g snyk
    - name: Authenticate Snyk CLI
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: snyk auth $SNYK_TOKEN
    - name: Snyk test dependencies
      run: snyk test --severity-threshold=high
    - name: Generate Snyk JSON Report
      if: always()
      run: |
        echo "Generando reporte JSON de Snyk..."
        snyk test --json > snyk-report.json || echo "Falló snyk test, pero se continúa"
        ls -lh snyk-report.json || echo "No se generó el reporte"
    - name: Upload Snyk JSON Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: snyk-report
        path: snyk-report.json

  deploy:
    name: Deploy to VPS
    runs-on: self-hosted
    needs: snyk-scan
    if: github.ref == 'refs/heads/develop'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Deploy with Docker Compose
      run: |
        docker compose -f compose.yaml down
        docker compose -f compose.yaml up -d --build


