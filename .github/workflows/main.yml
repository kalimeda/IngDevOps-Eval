name: test on dev push and main PR
on:
  push: 
    branches:
      - develop
  pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v2
        with:
          python-version: '3.8'
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: |
          pytest --maxfail=1 --disable-warnings -q

#==================================DOCKER BUILD===================================================
  docker-build:
    name: Docker-build
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build Docker image
      run: docker build -t ingdevopseval:${{ github.sha }} .
    - name: Save image as artifact
      run: docker save ingdevopseval:${{ github.sha }} > image.tar
    - uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: image.tar

#==================================SNYK======================================================================
  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: install Snyk CLI
      run: sudo npm install -g snyk

    - name: Authenticate Snyk CLI
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: snyk auth $SNYK_TOKEN


    - name: Generate Snyk JSON Report
      if: always()
      run: |
        echo "Generando reporte JSON  de Snyk..."
        snyk test --json > snyk-report.json || echo "Falló snyk test, pero se continúa"
        ls -lh snyk-report.json || echo "No se generó el reporte"

    - name: Upload Snyk JSON Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: snyk-report
        path: snyk-report.json


