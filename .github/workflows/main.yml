name: test on dev push and main PR


on: 
  push:
    branches:
      - main   

jobs:

  test:
    name: Run Test with jaCoCO
    runs-on: ubuntu-latest

    steps: 
    #CHECKOUT DE REPOSITORIO

    - name: Checkout code
      uses: actions/checkout@v4
    
    # CONFIGURAR JDK
    - name: Set up JDK 17 
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    # CACHE DEPENDENCIAS MAVEN
    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os  }}-m2-${{ hashFiles('**/pom.xml')  }}
        restore-keys: |
          ${{ runner.os }}-m2
    #CONTRUIR PROYECTO Y EJECUTAR TEST
    - name: Build and Test
      run: mvn clean verify

    #PUBLICAR COBERTURA DE JACOCO
    - name: Upload JaCoCo Report
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-report
        path: target/site/jacoco/

#==================================SNYK======================================================================
  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: install Snyk CLI
      run: sudo npm install -g snyk

    - name: Authenticate Snyk CLI
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: snyk auth $SNYK_TOKEN


    - name: Generate Snyk JSON Report
      if: always()
      run: |
        echo "Generando reporte JSON  de Snyk..."
        snyk test --json > snyk-report.json || echo "Falló snyk test, pero se continúa"
        ls -lh snyk-report.json || echo "No se generó el reporte"

    - name: Upload Snyk JSON Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: snyk-report
        path: snyk-report.json

  test-Snyk:
    name: Run Test Snyk
    runs-on: ubuntu-latest
    needs: snyk-scan

    steps: 
    #CHECKOUT DE REPOSITORIO

    - name: Checkout code
      uses: actions/checkout@v4
    
    # CONFIGURAR JDK
    - name: Set up JDK 17 
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    # CACHE DEPENDENCIAS MAVEN
    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os  }}-m2-${{ hashFiles('**/pom.xml')  }}
        restore-keys: |
          ${{ runner.os }}-m2
    #CONTRUIR PROYECTO Y EJECUTAR TEST
    - name: Build and Test
      run: mvn clean verify

    #PUBLICAR COBERTURA DE JACOCO
    - name: Upload JaCoCo Report
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-report
        path: target/site/jacoco/

#============================================BUILD======================================  
  build:
    name: Build Jar
    runs-on: ubuntu-latest
    needs: snyk-scan

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    # CONFIGURAR JDK
    - name: Set up JDK 17 
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Package application
      run: mvn clean package -DskipTests
      
    - name: Upload Jar Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-jar
        path: target/*.jar 