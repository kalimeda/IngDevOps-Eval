name: test on dev push and main PR
on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v2
        with:
          python-version: '3.8'
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: |
          pytest --maxfail=1 --disable-warnings -q

#==================================DOCKER BUILD & PUSH===========================================
  docker-build:
    name: Docker-build and push
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/ingdevopseval:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/ingdevopseval:${{ github.sha }}

#==================================SNYK======================================================================
  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Py
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - run: pip install -r requirements.txt        

    - name: install Snyk CLI
      run: sudo npm install -g snyk

    - name: Authenticate Snyk CLI
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: snyk auth $SNYK_TOKEN
    
    - name: Snyk test java dependencies
      run: snyk test --severity-thresold=high

    - name: Generate Snyk JSON Report
      if: always()
      run: |
        echo "Generando reporte JSON  de Snyk..."
        snyk test --json > snyk-report.json || echo "Falló snyk test, pero se continúa"
        ls -lh snyk-report.json || echo "No se generó el reporte"

    - name: Upload Snyk JSON Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: snyk-report
        path: snyk-report.json

#==================================DEPLOY TO EC2===================================================
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: snyk-scan
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: SSH and deploy container
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST_CAMBIAR }} << 'EOF'
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ingdevopseval:latest
            docker stop ingdevopseval || true
            docker rm ingdevopseval || true
            docker run -d --name ingdevopseval -p 8000:8000 ${{ secrets.DOCKERHUB_USERNAME }}/ingdevopseval:latest
          EOF